<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-label="A stylized document">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eef2f7"/>
      <stop offset="1" stop-color="#dde5ee"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1f2a37" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="640" height="360" fill="url(#bg)"/>

  <!-- back sheet -->
  <rect x="206" y="58" width="240" height="270" rx="10" fill="#ffffff" opacity="0.6"
        transform="rotate(6 326 193)"/>

  <!-- main document -->
  <g filter="url(#shadow)">
    <rect x="200" y="50" width="240" height="270" rx="10" fill="#ffffff"/>
    <!-- folded corner -->
    <path d="M392 50 H440 V98 Z" fill="#cdd7e3"/>
    <path d="M392 50 V98 H440 Z" fill="#e9eef4"/>
  </g>

  <!-- title -->
  <rect x="228" y="92" width="120" height="14" rx="7" fill="#2f6fed"/>
  <!-- text lines -->
  <g fill="#c7d0db">
    <rect x="228" y="126" width="184" height="9" rx="4.5"/>
    <rect x="228" y="146" width="184" height="9" rx="4.5"/>
    <rect x="228" y="166" width="140" height="9" rx="4.5"/>
    <rect x="228" y="196" width="184" height="9" rx="4.5"/>
    <rect x="228" y="216" width="184" height="9" rx="4.5"/>
    <rect x="228" y="236" width="160" height="9" rx="4.5"/>
    <rect x="228" y="266" width="100" height="9" rx="4.5"/>
  </g>
</svg>